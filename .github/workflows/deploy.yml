name: Build & Deploy Web Sites

on:
  push:
    branches: [develop, main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      promo: ${{ steps.filter.outputs.promo }}
      blog-math: ${{ steps.filter.outputs.blog-math }}
      blog-calculator: ${{ steps.filter.outputs.blog-calculator }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            promo:
              - 'projects/promo/**'
              - 'package.json'
              - 'angular.json'
              - 'tsconfig.json'
            blog-math:
              - 'projects/blog-math/**'
              - 'package.json'
              - 'angular.json'
              - 'tsconfig.json'
            blog-calculator:
              - 'projects/blog-calculator/**'
              - 'package.json'
              - 'angular.json'
              - 'tsconfig.json'

  build-and-deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: promo
            changed: ${{ needs.detect-changes.outputs.promo }}
          - app: blog-math
            changed: ${{ needs.detect-changes.outputs.blog-math }}
          - app: blog-calculator
            changed: ${{ needs.detect-changes.outputs.blog-calculator }}
    steps:
      - name: Skip if not changed
        if: matrix.changed != 'true'
        run: echo "No changes for ${{ matrix.app }}, skipping."

      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - name: Set environment
        if: matrix.changed == 'true'
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=prd" >> $GITHUB_OUTPUT
            echo "TAG=prd-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "TAG=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_NAME=${{ matrix.app }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.app }}:${{ steps.env.outputs.TAG }}

      - name: Deploy to EC2
        if: matrix.changed == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/fit/${{ steps.env.outputs.ENV }}
            export ${{ matrix.app }}_IMAGE=${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.app }}:${{ steps.env.outputs.TAG }}
            docker compose pull ${{ matrix.app }}
            docker compose up -d --no-deps ${{ matrix.app }}
